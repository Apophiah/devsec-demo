{% extends "apophia/base.html" %}

{% block title %}Password Reset Complete - Apophia{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 4rem auto; text-align: center;">
    <div class="card">
        <h1 style="color: #22c55e;">✅ Reset Successful</h1>
        <p style="margin-bottom: 2rem; color: var(--text-muted);">
            Your password has been successfully set. You may now log in with your new credentials.
        </p>
        <a href="{% url 'login' %}" class="btn">Log In Now</a>
    </div>
</div>
{% endblock %}
